name: Release

on:
  push:
    tags:
      # Matches version tags including semver build-metadata suffixes,
      # e.g. v2026.7.10 and v2026.7.10+akp. The `*` spans the `+akp`
      # suffix (it only stops at `/`), so no separate pattern is needed.
      - "*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Go 1.x
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
        id: go

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Pin to 22.22.x: Node 22.23.0 / 24.17.0 ship a keep-alive socket
          # regression (nodejs/node#63989) that breaks node-fetch, causing
          # firebase auth to fail with "Premature close". 22.22.x is the
          # latest known-good release.
          node-version: '22.22.3'

      - name: Install yq
        run: |
          curl -fsSL -o yqq https://github.com/mikefarah/yq/releases/download/3.3.0/yq_linux_amd64
          chmod +x yqq
          sudo mv yqq /usr/local/bin/yqq
          pipx install yq

      - name: Install Hugo
        run: |
          curl -fsSL -o hugo_extended.deb https://github.com/gohugoio/hugo/releases/download/v0.128.2/hugo_extended_0.128.2_linux-amd64.deb
          sudo dpkg -i hugo_extended.deb
          rm hugo_extended.deb

      # - name: Install Hugo Tools
      #   run: |
      #     curl -fsSL -o hugo-tools https://github.com/appscodelabs/hugo-tools/releases/download/v0.2.23/hugo-tools-linux-amd64
      #     chmod +x hugo-tools
      #     sudo mv hugo-tools /usr/local/bin/hugo-tools

      - name: Install Firebase CLI
        run: |
          npm i -g firebase-tools@v11.13.0

      - name: QA
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QA }}
        if: startsWith(github.event.ref, 'refs/tags/') && (contains(github.ref, '-alpha.') || contains(github.ref, '-beta.'))
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_KEY" > "$RUNNER_TEMP/firebase-key.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-key.json"
          rm -rf public bin
          npm install
          make docs
          make qa

      - name: Release
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
        if: startsWith(github.event.ref, 'refs/tags/') && (contains(github.ref, '-alpha.') || contains(github.ref, '-beta.')) == false
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_KEY" > "$RUNNER_TEMP/firebase-key.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-key.json"
          rm -rf public bin
          npm install
          make docs
          make release

      - name: Update search index
        env:
          MEILISEARCH_ADMIN_API_KEY: ${{ secrets.MEILISEARCH_ADMIN_API_KEY }}
        if: startsWith(github.event.ref, 'refs/tags/') && (contains(github.ref, '-alpha.') || contains(github.ref, '-beta.')) == false
        run: |
          curl \
            -X POST 'https://search.docs.appscode.com/indexes' \
            -H "Authorization: Bearer $MEILISEARCH_ADMIN_API_KEY" \
            -H 'Content-Type: application/json' \
            --data-binary '{
              "uid": "kubedb",
              "primaryKey": "documentId"
            }'
          curl \
            -X POST 'https://search.docs.appscode.com/indexes/kubedb/documents' \
            -H "Authorization: Bearer $MEILISEARCH_ADMIN_API_KEY" \
            -H 'Content-Type: application/json' \
            --data-binary @public/index.json
